server:

  port: 8001

# ==========applicationName + druid-mysql8 driver===================

spring:



  datasource:

    type: com.alibaba.druid.pool.DruidDataSource

    driver-class-name: com.mysql.cj.jdbc.Driver

    url: jdbc:mysql://localhost:3306/msCloudV5?characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true

    username: root

    password: 123456

  profiles:
    active: prod





# ========================mybatis===================

mybatis:

  mapper-locations: classpath:mapper/*.xml

  type-aliases-package: com.cloud.payment.domain.po

  configuration:

    map-underscore-to-camel-case: true

    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
